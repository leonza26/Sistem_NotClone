<!doctype html>

<html class="light" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Projects | Architectural Curator</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            .glass-panel {
                background: rgba(245, 250, 251, 0.7);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
            }
            .signature-gradient {
                background: linear-gradient(135deg, #316574 0%, #81b4c5 100%);
            }
            body {
                font-family: "Inter", sans-serif;
                background-color: #f5fafb;
            }
            h1,
            h2,
            h3,
            .display-md {
                font-family: "Manrope", sans-serif;
            }
        </style>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "surface-variant": "#dee3e4",
                            "inverse-on-surface": "#edf2f3",
                            "on-secondary": "#ffffff",
                            "tertiary-container": "#ff9035",
                            "outline-variant": "#c0c8cb",
                            "error-container": "#ffdad6",
                            "on-tertiary": "#ffffff",
                            "on-secondary-fixed": "#051f25",
                            "surface-container-low": "#eff4f5",
                            primary: "#316574",
                            "surface-dim": "#d6dbdc",
                            "surface-container-high": "#e4e9ea",
                            outline: "#70787b",
                            "inverse-surface": "#2c3132",
                            surface: "#f5fafb",
                            "inverse-primary": "#9bcee0",
                            "surface-container": "#eaeff0",
                            "on-secondary-fixed-variant": "#334a51",
                            "on-primary-fixed-variant": "#134d5c",
                            "on-primary-fixed": "#001f27",
                            "tertiary-fixed-dim": "#ffb785",
                            background: "#f5fafb",
                            "on-surface-variant": "#40484b",
                            "on-tertiary-fixed": "#301400",
                            "on-background": "#171d1e",
                            error: "#ba1a1a",
                            "on-primary-container": "#084755",
                            "on-tertiary-fixed-variant": "#713700",
                            "on-error-container": "#93000a",
                            "surface-tint": "#316574",
                            "surface-container-lowest": "#ffffff",
                            secondary: "#4b6269",
                            "secondary-fixed": "#cee7ef",
                            "tertiary-fixed": "#ffdcc6",
                            "primary-fixed": "#b7ebfd",
                            "secondary-container": "#cbe4ec",
                            tertiary: "#954a00",
                            "on-error": "#ffffff",
                            "on-primary": "#ffffff",
                            "on-secondary-container": "#4f666e",
                            "primary-fixed-dim": "#9bcee0",
                            "secondary-fixed-dim": "#b2cbd3",
                            "primary-container": "#81b4c5",
                            "surface-container-highest": "#dee3e4",
                            "surface-bright": "#f5fafb",
                            "on-surface": "#171d1e",
                            "on-tertiary-container": "#683200",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        fontFamily: {
                            headline: ["Manrope"],
                            body: ["Inter"],
                            label: ["Inter"],
                        },
                    },
                },
            };
        </script>

        <!-- SideNavBar -->

        >
            <div class="mb-10 px-2">
                <h2 class="text-lg font-bold tracking-tight text-teal-900">
                    Architectural Curator
                </h2>
                <p
                    class="text-[0.6875rem] uppercase tracking-[0.05em] text-slate-500 font-medium mt-1"
                >
                    Production Workspace
                </p>
            </div>
            <nav class="flex-1 space-y-1">
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="dashboard"
                        >dashboard</span
                    >
                    <span class="text-sm">Dashboard</span>
                </a>
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-teal-800 font-semibold border-r-2 border-teal-600 active:scale-[0.98] transition-all duration-200"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="folder_copy"
                        >folder_copy</span
                    >
                    <span class="text-sm">Projects</span>
                </a>
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="assignment"
                        >assignment</span
                    >
                    <span class="text-sm">Tasks</span>
                </a>
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="description"
                        >description</span
                    >
                    <span class="text-sm">Notes &amp; Docs</span>
                </a>
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span class="material-symbols-outlined" data-icon="pulse"
                        >pulse_alert</span
                    >
                    <span class="text-sm">Activity</span>
                </a>
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="smart_toy"
                        >smart_toy</span
                    >
                    <span class="text-sm">AI Assistant</span>
                </a>
            </nav>
            <div class="mt-auto pt-6 space-y-1 border-t border-slate-200/30">
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span class="material-symbols-outlined" data-icon="settings"
                        >settings</span
                    >
                    <span class="text-sm">Settings</span>
                </a>
                <a
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium hover:bg-slate-200/50 transition-colors"
                    href="#"
                >
                    <span class="material-symbols-outlined" data-icon="help"
                        >help</span
                    >
                    <span class="text-sm">Support</span>
                </a>
            </div>
        </aside>
        <!-- Main Canvas -->
        <main class="ml-64 min-h-screen relative">
            <!-- TopNavBar -->
            <header
                class="docked full-width top-0 sticky z-40 bg-white/70 backdrop-blur-xl flex justify-between items-center h-16 w-full px-8"
            >
                <div class="flex items-center gap-6">
                    <div class="relative">
                        <span
                            class="absolute inset-y-0 left-3 flex items-center text-slate-400"
                        >
                            <span
                                class="material-symbols-outlined text-[20px]"
                                data-icon="search"
                                >search</span
                            >
                        </span>
                        <input
                            class="bg-surface-container-low border-none rounded-full pl-10 pr-4 py-1.5 text-sm w-64 focus:ring-1 focus:ring-primary/50 transition-all"
                            placeholder="Search workspace..."
                            type="text"
                        />
                    </div>
                    <nav class="hidden md:flex items-center gap-6">
                        <a
                            class="text-slate-600 hover:text-teal-600 text-sm font-medium transition-colors"
                            href="#"
                            >Workspaces</a
                        >
                        <a
                            class="text-slate-600 hover:text-teal-600 text-sm font-medium transition-colors"
                            href="#"
                            >Recent</a
                        >
                        <a
                            class="text-slate-600 hover:text-teal-600 text-sm font-medium transition-colors"
                            href="#"
                            >Templates</a
                        >
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <button
                        class="text-slate-600 hover:text-teal-600 p-2 transition-colors"
                    >
                        <span
                            class="material-symbols-outlined"
                            data-icon="notifications"
                            >notifications</span
                        >
                    </button>
                    <button
                        class="text-slate-600 hover:text-teal-600 p-2 transition-colors"
                    >
                        <span
                            class="material-symbols-outlined"
                            data-icon="history"
                            >history</span
                        >
                    </button>
                    <div
                        class="h-8 w-8 rounded-full overflow-hidden ml-2 ring-2 ring-surface-container-high transition-transform hover:scale-105 cursor-pointer"
                    >
                        <img
                            class="h-full w-full object-cover"
                            data-alt="Close-up portrait of a professional male architect in a studio setting with soft natural window lighting"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmCZ4ifiqu-HFYlr4T9la9gm33hta-QokfkrdRZ-7pN23oXB53sv-AG84irLJ1h1CQl0Kk99iXtIHQ_TiBN1LOPsa7KHTDTpqrcWKFfkgnhwZe9Su1P4BSwwNEP8j5wMD64FmmNluOLaWLfCxx_JqEw-Jcz8iFEGxM6Tuo8seZ65sGPrTa96M23RRIdQbFD7LdpvjeSIbPBtRkQp9FutfDateupLZmpUgAdZWT2K4ELH_S6THiAab3g0IboCsSlRQILFcMAbBkFEk"
                        />
                    </div>
                </div>
            </header>
        </main>
    </body>
</html>
